name: Morning fixtures

on:
  schedule:
    - cron: "0 15 * * *"  # 8:00 AM PT (June = PDT, UTC-7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Post today's matchups
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/morning.mjs
