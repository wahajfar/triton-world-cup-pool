name: Tick

# Single entry point driven by an EXTERNAL cron pinger (GitHub's own scheduler is unreliable
# on free tier). Ping this workflow's dispatch endpoint every ~10 min and it does the rest.
#
# TWO JOBS with SEPARATE concurrency lanes so the slow standings step can NEVER block live:
#   • live      — live watcher + match strip + morning fixtures. Fast (~20s). Lane: wc-live.
#   • standings — Claude + web-search survival update. Slow (10–20 min). Lane: wc-standings.
# Because concurrency is per-job (not workflow-level), a long standings run does not hold up
# the next tick's live watcher — they run in parallel lanes.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    concurrency:
      group: wc-live
      cancel-in-progress: false
    outputs:
      update: ${{ steps.t.outputs.update }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decide what runs this tick
        id: t
        run: |
          # Interval-proof gating: based on elapsed time, not clock minute — safe at any ping rate.
          H=$(date -u +%H); NOW=$(date -u +%s); TODAY=$(date -u +%F)
          STATE=data/tick-state.json
          LU=$(jq -r '.last_update // 0' "$STATE" 2>/dev/null || echo 0)
          LM=$(jq -r '.last_morning // ""' "$STATE" 2>/dev/null || echo "")
          # standings: match hours (UTC 15–23 or 0–7) and ≥55 min since the last update
          if { [ "$H" -ge 15 ] || [ "$H" -le 7 ]; } && [ $((NOW - LU)) -ge 3300 ]; then echo "update=yes"; else echo "update=no"; fi >> "$GITHUB_OUTPUT"
          # morning fixtures: UTC hour 15 (≈08:00 PT), once per calendar day
          if [ "$H" = "15" ] && [ "$LM" != "$TODAY" ]; then echo "morning=yes"; else echo "morning=no"; fi >> "$GITHUB_OUTPUT"
          echo "now=$NOW" >> "$GITHUB_OUTPUT"; echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          echo "lu=$LU" >> "$GITHUB_OUTPUT"; echo "lm=$LM" >> "$GITHUB_OUTPUT"

      - name: Live watcher
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/live.mjs

      - name: Match strip + recaps (ESPN → data/matches.json)
        run: node scripts/matches.mjs

      - name: Morning fixtures
        if: steps.t.outputs.morning == 'yes'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/morning.mjs

      - name: Record run times
        run: |
          # last_update is advanced here (optimistically) when an update is due; the actual
          # standings job runs in its own lane and only commits standings.json.
          LU="${{ steps.t.outputs.lu }}"; LM="${{ steps.t.outputs.lm }}"
          [ "${{ steps.t.outputs.update }}" = "yes" ] && LU="${{ steps.t.outputs.now }}"
          [ "${{ steps.t.outputs.morning }}" = "yes" ] && LM="${{ steps.t.outputs.today }}"
          printf '{"last_update":%s,"last_morning":"%s"}\n' "$LU" "$LM" > data/tick-state.json

      - name: Commit live data
        run: |
          FILES="data/live-state.json data/matches.json data/tick-state.json"
          if [ -z "$(git status --porcelain $FILES)" ]; then echo "no live change"; exit 0; fi
          git config user.name "world-cup-bot"
          git config user.email "actions@github.com"
          git add $FILES
          git commit -m "chore: live ($(date -u +%Y-%m-%dT%H:%MZ))"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            sleep 3
          done
          exit 1

  standings:
    needs: live
    if: needs.live.outputs.update == 'yes'
    runs-on: ubuntu-latest
    concurrency:
      group: wc-standings
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Standings updater (Claude + web search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          npm install --no-audit --no-fund
          node scripts/update.mjs

      - name: Commit standings
        run: |
          if [ -z "$(git status --porcelain data/standings.json)" ]; then echo "no standings change"; exit 0; fi
          git config user.name "world-cup-bot"
          git config user.email "actions@github.com"
          git add data/standings.json
          git commit -m "chore: standings ($(date -u +%Y-%m-%dT%H:%MZ))"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            sleep 3
          done
          exit 1
