name: Update World Cup standings

on:
  schedule:
    # Hourly during match hours (UTC). June PT = UTC-7 → covers ~8am–midnight PT.
    # Refreshes the site every hour; only posts to Slack when standings actually change.
    - cron: "0 15-23 * * *"
    - cron: "0 0-7 * * *"
  workflow_dispatch:
    inputs:
      digest:
        description: "Force-send the daily digest"
        type: boolean
        default: false

concurrency:
  group: wc-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DIGEST: ${{ inputs.digest }}
        run: npm run update

      - name: Commit updated standings
        run: |
          if [[ -z "$(git status --porcelain data/standings.json)" ]]; then
            echo "No standings change — nothing to commit."
            exit 0
          fi
          git config user.name "world-cup-bot"
          git config user.email "actions@github.com"
          git add data/standings.json
          git commit -m "chore: update standings ($(date -u +%Y-%m-%dT%H:%MZ))"
          # Race-proof push: if another commit landed first, rebase our
          # freshly-generated data on top (favouring ours) and retry.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            echo "push rejected — rebasing onto latest and retrying ($attempt)"
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            sleep 3
          done
          echo "push failed after retries"; exit 1
